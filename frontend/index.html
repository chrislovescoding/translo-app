<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translo Chat App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="auth-container" class="auth-container">
        <div id="login-form" class="auth-form">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="Email" required>
            <input type="password" id="login-password" placeholder="Password" required>
            <button id="login-button">Login</button>
            <p>Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
            <p id="login-error" class="error-message"></p>
        </div>

        <div id="signup-form" class="auth-form" style="display: none;">
            <h2>Sign Up</h2>
            <input type="text" id="signup-username" placeholder="Username" required>
            <input type="email" id="signup-email" placeholder="Email" required>
            <input type="password" id="signup-password" placeholder="Password" required>
            <button id="signup-button">Sign Up</button>
            <p>Already have an account? <a href="#" id="show-login">Login</a></p>
            <p id="signup-error" class="error-message"></p>
        </div>
    </div>

    <div id="app-container" class="container" style="display: none;">
        <div class="sidebar">
            <h3>Friends</h3>
            <div class="user-search">
                 <input type="text" id="user-search-input" placeholder="Search users...">
                 <button id="user-search-button">Search</button>
            </div>
            <ul id="search-results-list"></ul>
            <ul id="friend-list">
                </ul>
             <h3>Pending Requests</h3>
             <ul id="pending-requests-list">
                </ul>
            <button id="logout-button">Logout</button>
        </div>

        <div class="phone" id="chat-interface">
            <div class="screen">
                <div class="chat-header">
                     <h3 id="chat-with-username">Select a friend to chat</h3>
                 </div>
                <div class="messages" id="messages-area">
                    </div>
                <div class="input_area">
                    <input id="message-input" class="text_input" placeholder="Type a message…" type="text" disabled>
                    <button id="send-button" class="send_button" aria-label="Send" disabled><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
                </div>
            </div>
        </div>
        </div>

    <script src="script.js"></script>
</body>
</html>
